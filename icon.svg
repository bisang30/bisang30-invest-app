<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" /> <!-- Slate 900 -->
      <stop offset="100%" style="stop-color:#1e293b" /> <!-- Slate 800 -->
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6" /> <!-- Blue 500 -->
      <stop offset="100%" style="stop-color:#60a5fa" /> <!-- Blue 400 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="100" height="100" rx="24" fill="url(#mainGrad)" />
  
  <!-- Abstract Growth Line -->
  <path d="M25 70 L40 55 L55 60 L75 35" 
        fill="none" 
        stroke="url(#accentGrad)" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Nodes on the line -->
  <circle cx="25" cy="70" r="3" fill="#3b82f6" />
  <circle cx="40" cy="55" r="3" fill="#3b82f6" />
  <circle cx="55" cy="60" r="3" fill="#3b82f6" />
  <circle cx="75" cy="35" r="4" fill="#60a5fa" filter="url(#glow)" />

  <!-- Decorative Elements -->
  <rect x="25" y="78" width="50" height="2" rx="1" fill="#334155" />
  <rect x="25" y="83" width="30" height="2" rx="1" fill="#334155" />
</svg>
